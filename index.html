<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Meine erweitere Kochrezept-Datenbank" />
  <!-- Kein Browser-Cache: Immer die aktuellste Version laden -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <!-- iOS Home-Screen App Einstellungen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meine Rezepte" />
  <title>🍴 Meine Rezepte 1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #f97316;
      --accent2: #fb923c;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #2e3347;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Utilities ── */
    .hidden {
      display: none !important;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), #fbbf24);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.35);
    }

    .header-title h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .header-title span {
      font-size: 13px;
      color: var(--muted);
    }

    .exit-btn {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .exit-btn:hover {
      background: #dc2626;
      border-color: #ef4444;
    }

    /* ── Search Area ── */
    .search-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.6;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      /* iOS Safari zoom fix */
      padding: 12px 16px 12px 40px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
    }

    input::placeholder {
      color: var(--muted);
    }



    /* ── Main Layout ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── List View ── */
    .stats-bar {
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .stats-bar strong {
      color: var(--accent);
    }

    .recipe-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recipe-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    .recipe-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Detail View ── */
    .back-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      margin-bottom: 20px;
      transition: color 0.1s;
    }

    .back-btn:hover {
      color: var(--accent);
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 20px;
      display: none;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .info-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .info-box span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .info-box strong {
      font-size: 14px;
      color: var(--text);
    }

    section {
      margin-bottom: 30px;
    }

    section h2 {
      font-size: 18px;
      color: var(--accent);
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .ingredient-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ingredient-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
    }

    .ingredient-table tr:last-child td {
      border-bottom: none;
    }

    .col-amount {
      width: 30%;
      font-weight: 600;
      color: #fff;
    }

    .col-name {
      width: 70%;
      color: var(--muted);
    }

    .instructions-text {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
      color: #cbd5e1;
    }

    .instructions-text ol {
      padding-left: 20px;
    }

    .instructions-text li {
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      header {
        position: static; /* Header klebt auf Handys nicht mehr am oberen Rand fest */
        padding: 12px 16px;
      }
      .header-top {
        margin-bottom: 10px;
      }
      .logo {
        width: 32px;
        height: 32px;
        font-size: 16px;
        border-radius: 8px;
      }
      .header-title h1 {
        font-size: 16px;
      }
      .header-title span {
        display: none; /* Untertitel bei Platzmangel ausblenden */
      }
      .search-panel {
        gap: 6px;
      }
      input {
        font-size: 14px;
        padding: 10px 16px 10px 36px;
      }
    }
  </style>
</head>

<body>

  <!-- VIEW: LIST -->
  <div id="view-list">
    <header>
      <div class="header-top">
        <div class="logo">🍴</div>
        <div class="header-title">
          <h1>Meine Rezepte 1.0</h1>
          <span>Praktisch, Schnell & Lecker</span>
        </div>
        <button class="exit-btn" onclick="window.close()">Beenden</button>
      </div>

      <div class="search-panel">
        <div class="input-wrap">
          <span class="input-icon">🔍</span>
          <input type="text" id="search-name" placeholder="Name oder Stichwort suchen..." oninput="updateList()">
        </div>
        <div class="input-wrap">
          <span class="input-icon">🥑</span>
          <input type="text" id="search-ing" placeholder="Zutaten suchen (mit Komma trennen)..." oninput="updateList()">
        </div>
      </div>
    </header>

    <main>
      <div class="stats-bar">Gefundene Rezepte: <strong id="count-badge">-</strong></div>
      <div id="recipe-list" class="recipe-list"></div>
    </main>
  </div>

  <!-- VIEW: DETAIL -->
  <div id="view-detail" class="hidden">
    <main>
      <button class="back-btn" onclick="showList()">← Zurück zur Übersicht</button>

      <div class="hero">
        <img id="det-image" class="hero-image" src="" alt="Rezept Bild" />
        <h1 class="hero-title" id="det-title">Titel</h1>
        <div class="card-tags" id="det-tags"></div>
      </div>

      <div class="info-grid">
        <div class="info-box"><span>Portionen</span><strong id="det-portions">-</strong></div>
        <div class="info-box"><span>Zeit</span><strong id="det-time">-</strong></div>
        <div class="info-box"><span>Energie</span><strong id="det-energy">-</strong></div>
      </div>

      <section>
        <h2>Zutaten</h2>
        <table class="ingredient-table" id="det-ings"></table>
      </section>

      <section>
        <h2>Zubereitung</h2>
        <div class="instructions-text" id="det-inst"></div>
      </section>

      <section id="sec-notes" class="hidden">
        <h2>Anmerkungen</h2>
        <div class="instructions-text" id="det-notes"></div>
      </section>

      <section id="sec-source" class="hidden">
        <h2>Quelle / Link</h2>
        <div style="font-size: 15px; margin-top: 5px;" id="det-source"></div>
      </section>
    </main>
  </div>

e": "Zucchini"}, {"amount": "2", "name": "Lachsfilets"}, {"amount": "1", "name": "Knoblauchzehe"}, {"amount": "1/4 l", "name": "Hafersahne"}, {"amount": "", "name": "etwas frisch gehacker Dill"}, {"amount": "3 TL", "name": "milder Senf"}, {"amount": "", "name": "Salz und Pfeffer aus der Mühle"}], "instructions": ["Die Kartoffeln mit der Schale waschen und in Wasser in etwa 20 Minuten weich garen. Anschließend pellen und in Scheiben schneiden.", "Die Zucchini putzen, waschen und in Scheiben schneiden. Den Lachs waschen und trocken tupfen.", "Gemüse in eine Auflaufform geben und mit dem Lachs belegen.", "Den Knoblauch schälen, fein schneiden und mit Hafersahne, Dill, Senf, Salz und Pfeffer verrühren und über den Auflauf geben.", "Diesen im Backofen bei 180°C ca. 25 Minuten garen."], "notes": "Sehr gut schmecken statt Dill auch Sommerkräuter.", "id": 8}, {"name": "Ligurische Nudeln", "categories": ["Hauptgericht", "Einfach", "Schnell"], "portions": "4 ? s", "prep_time": "35 min", "energy": "", "ingredients": [{"amount": "1", "name": "Zwiebel"}, {"amount": "1", "name": "Knoblauch"}, {"amount": "250 g", "name": "Tiefgefrorene Brechbohnen"}, {"amount": "250 g", "name": "Kartoffeln"}, {"amount": "400 g", "name": "Penne oder andere kurze Nudeln"}, {"amount": "1 Glas", "name": "Pesto"}, {"amount": "", "name": "Parmesan"}, {"amount": "", "name": "Salz, Pfeffer"}], "instructions": ["Zwiebel und Knoblauch zerkleinern und anbraten", "Kartoffelwürfel und Gewürze dazu geben und mit etwas Wasser 15 min kochen.", "Die klein gebrochenen oder geschnittenen Bohnen hinzugeben und weitere 5 min kochen.", "Zur gleichen Zeit die Nudeln al dente kochen, dann ebenfalls abgießen.", "Das Pesto erhitzen und dazu noch 3 - 4 EL des Nudelwassers geben.", "Sämtliche Zutaten nun miteinander vorsichtig vermengen und und nach Belieben mit Parmesan bestreuen."], "id": 2, "source": "https://www.chefkoch.de/rezepte/691131171623900/Ligurische-Nudeln.html", "image": "", "notes": "Rezept von Marita"}, {"name": "Linsen und Spätzle", "categories": ["Hauptgericht"], "portions": "2", "prep_time": "50 min", "energy": "", "source": "", "image": "", "ingredients": [{"amount": "250 g", "name": "Linsen"}, {"amount": "500 ml", "name": "Wasser"}, {"amount": "1 kleine oder 1/2", "name": "Zwiebel"}, {"amount": "1 kleine Stange", "name": "Lauch"}, {"amount": "2", "name": "Karotten"}, {"amount": "3 EL", "name": "Öl"}, {"amount": "2 EL", "name": "Mehl"}, {"amount": "1 EL", "name": "Essig"}, {"amount": "250 - 300g", "name": "Spätzle"}, {"amount": "2 - 4", "name": "Saitenwürstchen"}], "instructions": ["Zwiebel, Lauch und Korotten klein schneiden", "Zwiebel in 1 EL Öl anbraten", "Linsen und das Wasser hinzugeben und 5 min kochen", "Gemüse dazu geben und 15 min kochen", "Für die Schwitze das Öl erhitzen, das Mehl unter ständigem Rühren dazugeben. Mit etwas Wasser ablöschen.", "Schwitze und Essig zu den Linsen hinzugeben", "Spätzle parallel nach Anleitung kochen"], "id": 6, "notes": "Kochzeit auf der Linsenpackung ist zu lang."}, {"name": "Pilz-Bourguignon", "categories": ["Hauptgericht"], "portions": "4", "prep_time": "60 - 80 min", "energy": "", "source": "https://www.instagram.com/reel/DBjj2SCgRHp/?igsh=enY0eHF1aW90NG9z", "image": "", "ingredients": [{"amount": "500 g", "name": "Champignons"}, {"amount": "2 kleine", "name": "Karotten"}, {"amount": "1/2", "name": "Lauchstange"}, {"amount": "1 Handvoll", "name": "Perlzwiebeln"}, {"amount": "1 EL", "name": "Tomatenmark"}, {"amount": "1 EL", "name": "Mehl"}, {"amount": "150 ml", "name": "Rotwein"}, {"amount": "1 EL", "name": "Miso (oder Brühe nach Wahl)"}, {"amount": "ca. 350 ml", "name": "Wasser"}, {"amount": "1 TL", "name": "Kräuter der Provence"}, {"amount": "1", "name": "Knoblauchzehe"}, {"amount": "2 Stück", "name": "Zartbitterschokolade"}, {"amount": "1", "name": "Lorbeerblatt"}, {"amount": "2 Zweige", "name": "Rosmarin"}, {"amount": "1/3 Bund", "name": "Petersilie"}], "instructions": ["Die Champignons waschen und in dickere Scheiben schneiden.", "Den Lauch halbieren, waschen und schräg in Streifen schneiden.", "Die Karotten schälen und ebenso schräg in Scheiben schneiden. Große Karotten halbieren.", "Perlzwiebeln halbieren.", "Das Miso in heißem Wasser auflösen und zur Seite stellen.", "Öl in einer Pfanne erhitzen und die Champignons am besten in zwei Portionen hinzugeben und in 2 min bei starker Hitze unter Rühren braten. Dann herausnehmen.", "Mit etwas Öl die Karotten, den Lauch und die Perlzwiebeln in die gleich Pfanne geben. Salzen, pfeffern und gut vermischen. Ca. 5 min bei mittlerer Hitze garen.", "Das Tomatenmark und das Mehl hinzufügen und eine Minute lang verrühren.", "Dann den Rotwein hinzufügen und erneut vermischen.", "Die mit Miso angereicherte Brühe und die gebratenen Champignons dazugeben. Ebenso das Lorbeerblatt, die Kräuter, zwei Rosmarinzweige und eine zerdrückte Knoblauchzehe hinzufügen.", "Abdecken, dabei einen kleinen Spalt offen lassen, und etwa 25 Minuten köcheln lassen, bis das Gemüse weich ist.", "Die Schokolade hinzufügen, verrühren und noch 3 Minuten weiter köcheln lassen. Die Sauce sollte schön sämig sein.", "Mit frischer Petersilie bestreuen und heiß servieren mit Kartoffelpüree, Polenta oder frischer Pasta."], "notes": "Rezept vom Bergwaldprojekt\nKräuter der Provence ersetzt Thymian und Rosmarin.", "id": 14}, {"name": "Schufnudeln á la Theresa", "categories": ["Hauptgericht"], "portions": "3", "prep_time": "", "energy": "", "source": "", "image": "", "ingredients": [{"amount": "12 - 14", "name": "Pilze"}, {"amount": "2 Packungen", "name": "Schupfnudeln"}, {"amount": "100 g", "name": "Pilze"}, {"amount": "2 EL", "name": "Sojasoße"}, {"amount": "500 g", "name": "Sauerkraut"}, {"amount": "1 EL", "name": "Olivenöl"}], "instructions": ["Tofu in kleine Würfel zerteilen", "Pilze säubern und in Portionsstücke schneiden", "Pilze in etwas Öl anbraten und mit Sojasoße ablöschen.", "Tofu, Sauerkraut und Olivenöl hinzugeben und ca. 30 min braten."], "notes": "", "id": 13}, {"   <script>
    let allRecipes = [];

    function initApp() {
      if (window.APP_RECIPES && window.APP_RECIPES.recipes) {
        allRecipes = window.APP_RECIPES.recipes;
      } else {
        document.getElementById('recipe-list').innerHTML = '<div style="color:red; margin:20px;">Fehler: Keine Rezept-Daten in window.APP_RECIPES gefunden.</div>';
        return;
      }

      // Sortiere alphabetisch
      allRecipes.sort((a, b) => a.name.localeCompare(b.name, 'de'));
      updateList();
    }

    // Call it immediately! (Since script is at the end of the body)
    initApp();

    function updateList() {
      const qName = document.getElementById('search-name').value.toLowerCase().trim();
      const ingInput = document.getElementById('search-ing').value.toLowerCase();
      const ingQueries = ingInput.split(',').map(s => s.trim()).filter(s => s.length > 0);

      const filtered = allRecipes.filter(r => {
        // Name und Kategorie (Stichwörter) check
        if (qName) {
          const matchName = r.name.toLowerCase().includes(qName);
          const matchCat = r.categories && r.categories.some(c => c.toLowerCase().includes(qName));
          if (!matchName && !matchCat) return false;
        }

        // Ingredient check (alle angegebenen müssen vorhanden sein = UND Verknüpfung)
        const hasIng = (searchStr) => {
          if (!r.ingredients) return false;
          return r.ingredients.some(ing => ing.name.toLowerCase().includes(searchStr));
        };

        for (const q of ingQueries) {
          if (!hasIng(q)) return false;
        }

        return true;
      });

      renderList(filtered);
    }

    function renderList(recipes) {
      document.getElementById('count-badge').textContent = recipes.length;
      const listDiv = document.getElementById('recipe-list');

      if (recipes.length === 0) {
        listDiv.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--muted)">Kein Rezept gefunden.</div>`;
        return;
      }

      listDiv.innerHTML = recipes.map(r => {
        const timeIcon = r.prep_time ? `⏱️ ${esc(r.prep_time)}` : '';
        const tagsHtml = (r.categories || []).map(c => `<span class="tag">${esc(c)}</span>`).join('');

        return `
          <div class="recipe-card" onclick="showDetail(${r.id})">
            <div class="card-top">
              <div class="card-title">${esc(r.name)}</div>
            </div>
            <div class="card-bottom">
              <div class="card-tags">${tagsHtml}</div>
              <div class="card-meta">${timeIcon}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function showDetail(id) {
      const r = allRecipes.find(x => x.id === id);
      if (!r) return;

      document.getElementById('view-list').classList.add('hidden');
      document.getElementById('view-detail').classList.remove('hidden');
      window.scrollTo(0, 0);

      document.getElementById('det-title').textContent = r.name;

      const tagsHtml = (r.categories || []).map(c => `<span class="tag">${esc(c)}</span>`).join('');
      document.getElementById('det-tags').innerHTML = tagsHtml;

      document.querySelector('.info-grid').style.display = (r.portions || r.prep_time || r.energy) ? 'grid' : 'none';

      document.getElementById('det-portions').parentElement.style.display = r.portions ? 'block' : 'none';
      document.getElementById('det-portions').textContent = r.portions || '-';

      document.getElementById('det-time').parentElement.style.display = r.prep_time ? 'block' : 'none';
      document.getElementById('det-time').textContent = r.prep_time || '-';

      document.getElementById('det-energy').parentElement.style.display = r.energy ? 'block' : 'none';
      document.getElementById('det-energy').textContent = r.energy || '-';

      if (r.image && r.image.trim() !== "") {
        let imgSrc = r.image.trim();
        // Windows Desktop-Pfade in ein valides file:// URL Format umwandeln
        if (/^[a-zA-Z]:[\\/]/.test(imgSrc)) {
          imgSrc = "file:///" + imgSrc.replace(/\\/g, "/");
        }
        document.getElementById('det-image').src = imgSrc;
        document.getElementById('det-image').style.display = 'block';
      } else {
        document.getElementById('det-image').style.display = 'none';
        document.getElementById('det-image').src = "";
      }

      if (r.source && r.source.trim() !== "") {
        document.getElementById('sec-source').classList.remove('hidden');

        let linkHref = r.source.trim();
        // Fallback falls der User keine URL Schema wie http:// oder https:// eingegeben hat:
        if (!linkHref.startsWith("http://") && !linkHref.startsWith("https://")) {
          linkHref = "https://" + linkHref;
        }

        document.getElementById('det-source').innerHTML = `<a href="${esc(linkHref)}" target="_blank" style="color: var(--accent); text-decoration: underline; word-break: break-all;">${esc(r.source.trim())}</a>`;
      } else {
        document.getElementById('sec-source').classList.add('hidden');
      }

      const ingsHtml = (r.ingredients || []).map(i =>
        `<tr><td class="col-amount">${esc(i.amount)}</td><td class="col-name">${esc(i.name)}</td></tr>`
      ).join('');
      document.getElementById('det-ings').innerHTML = ingsHtml;

      if (Array.isArray(r.instructions) && r.instructions.length > 0) {
        document.getElementById('det-inst').innerHTML = '<ol>' + r.instructions.map(step => `<li>${esc(step)}</li>`).join('') + '</ol>';
      } else if (r.instructions && typeof r.instructions === 'string') {
        document.getElementById('det-inst').textContent = r.instructions;
      } else {
        document.getElementById('det-inst').innerHTML = '<span style="color:var(--muted)">Keine Anleitung vorhanden.</span>';
      }

      if (r.notes && r.notes.trim() !== "") {
        document.getElementById('sec-notes').classList.remove('hidden');
        document.getElementById('det-notes').textContent = r.notes;
      } else {
        document.getElementById('sec-notes').classList.add('hidden');
      }
    }

    function showList() {
      document.getElementById('view-detail').classList.add('hidden');
      document.getElementById('view-list').classList.remove('hidden');
    }

    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>

  <!-- Auto-Update wenn App vom Home-Bildschirm geöffnet wird -->
  <script>
    // Nur aktiv, wenn die App als Home-Screen-Icon geöffnet wird (Standalone-Modus)
    if (window.navigator.standalone === true) {
      const REFRESH_INTERVAL_MS = 5 * 60 * 1000; // 5 Minuten

      // Zeitpunkt des Ladens speichern
      localStorage.setItem('lastAppLoad', Date.now());

      // Beim Wechsel zurück in die App prüfen ob ein Reload nötig ist
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
          const lastLoad = parseInt(localStorage.getItem('lastAppLoad') || '0');
          const now = Date.now();
          if (now - lastLoad > REFRESH_INTERVAL_MS) {
            // Mehr als 5 Minuten vergangen → lautlos neu laden
            localStorage.setItem('lastAppLoad', now);
            location.reload(true);
          }
        }
      });
    }
  </script>
